name: Update server

on:
  pull_request:
    branches:
    - master

jobs:
  check-new-settings:
    uses: sublimelsp/workflows/.github/workflows/changed-settings.yaml@main
    with:
      repository_url: 'https://github.com/sveltejs/language-tools'
      configuration_file_path: 'packages/svelte-vscode/package.json'
      configuration_jq_query: '.contributes.configuration.properties'
      version_file: 'server/package.json'
      version_regexp: '"svelte-language-server": "([^"]+)"'
